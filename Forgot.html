<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Password</title>
    <style>
        * {
            list-style-type:none;
            padding: 0;
            margin: 0;
        }
        body {
            background-color: rgb(227, 227, 227);
        }
        .basic_contaner {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 80px auto 130px;
            grid-template-areas: 
                "header"
                "main"
                "footer";
        }
        .Header {
            grid-area: header;
            display:flex;
            justify-self: flex-end;
            height:100%;
            width:100%;
        }
        .Login_out_container{
            grid-area: main;
            background-color: rgb(255, 255, 255);
        }
        .Login_container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 80vh;
        }
        .Login-container-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 420px;
            height: auto;
            margin: 30px auto;
            padding: 20px;
        }
        .find-box {
            width: 100%;
        }
        .find-box input {
            display: block;
            width: 100%;
            margin: 15px 0;
            padding: 12px;
            background-color: rgb(215, 215, 215);
            border: 1px solid rgb(227, 227, 227);
            border-radius: 5px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .find-box button {
            width: 100%;
            margin: 20px 0;
            padding: 12px;
            background: #8ebff1;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-size: 16px;
        }
        .find-box button:hover {
            background: #338eef;
        }
        .back-login {
            text-align: center;
            margin-top: 10px;
        }
        .back-login a {
            color: rgb(75, 129, 255);
            font-size: 12px;
            text-decoration: none;
        }
        .back-login a:hover {
            text-decoration: underline;
        }
        .footer-Serve {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .footer-Serve a {
            display: inline-block;
            margin: 30px 15px 0 15px;
            font-size: 15px;
            text-align: center;
            color: rgb(99, 99, 99);
            text-decoration: none;
        }
        .footer-Serve a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .Login-container-box {
                width: 90%;
            }
            .footer-Serve a {
                margin: 30px 10px 0 10px;
            }
        }
    </style>
</head>
<body>
    <script src="Forgotck.js"></script>
    <div class="basic_contaner">
        <div class="Header" >
            <h2 style="color: rgb(71, 71, 71); margin: 20px 20px 0 50px;">DragonGod Phone</h2>
        </div>

        <div class="Login_out_container">   
            <div class="Login_container">
                <h1 style="color: rgb(71, 71, 71);">Find Password</h1>
                <div class="Login-container-box">
                    <div class="find-box">
                        <input type="text" id="account" placeholder="Enter the phone number/email address">
                        <button onclick="checkForm()">Submit</button>
                        <div class="back-login">
                            <a href="LoginPage.html">Back to Login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div>
            <div class="footer-Serve">
                <a href="#">Terms of Service</a>
                <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
                <a href="#">Privacy Policy</a>
                <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
                <a href="#">Contact Us</a>
            </div>
            <p style="color: rgb(120, 120, 120); text-align: center; margin: 20px 0;">© 2026 DragonGod Phone. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
