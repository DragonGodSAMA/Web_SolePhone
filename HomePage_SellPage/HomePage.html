<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            background-color: rgb(227, 227, 227);
        }
        .basiccontainer {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .Header {
            display: flex;
            align-items: center;
            height: 80px;
            width: 100%;
        }
        .contentwrap {
            display: flex;
            flex-direction: column;
            width: 92%;
            margin: 24px auto 0;
        }
        .page {
            width: 100%;
            margin: 0 auto 20px;
            background-color: #ffffff;
            border-radius: 5px;
            padding: 18px 22px 28px;
        }
        .toprow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 26px;
        }
        .namebox {
            min-width: 50px;
            min-height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 6px 14px;
        }
        .namebox img {
            width: 44px;
            height: 44px;
        }
        .loginbtn {
            text-decoration: none;
            color: white;
            background: rgb(184, 122, 122);
            border-radius: 5px;
            font-size: 16px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .loginbtn:hover {
            background: rgb(234, 179, 179);
        }
        .mainbox {
            padding: 42px 24px;
        }
        .productcard {
            width: 100%;
            max-width: 980px;
            margin: 0 auto;
            min-height: 560px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 28px 32px;
            background-color: rgb(250, 250, 250);
            border-radius: 5px;
        }
        .productimage {
            width: 100%;
            max-width: 520px;
            height: 280px;
            object-fit: contain;
            margin-bottom: 28px;
        }
        .productname {
            width: 100%;
            max-width: 780px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 24px;
            color: rgb(71, 71, 71);
        }
        .actions {
            display: flex;
            gap: 36px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            text-decoration: none;
            color: white;
            background: rgb(184, 122, 122);
            border-radius: 5px;
            min-width: 120px;
            padding: 12px 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 500;
        }
        .btn:hover {
            background: rgb(234, 179, 179);
        }
        .singlecard {
            margin-bottom: 26px;
        }
        .nextlistanchor {
            text-align: center;
            font-size: 20px;
            color: #666666;
        }
        .Footer {
            width: 100%;
            padding-bottom: 18px;
        }
        .footerServe {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .footerServe a {
            display: inline-block;
            margin: 20px 15px 0 15px;
            font-size: 15px;
            text-align: center;
            color: rgb(99, 99, 99);
            text-decoration: none;
        }
        .footerServe a:hover {
            text-decoration: underline;
        }
        .footertext {
            color: rgb(120, 120, 120);
            text-align: center;
            margin: 16px 0 0;
            font-size: 13px;
        }
        @media (max-width: 1100px) {
            .loginbtn {
                font-size: 14px;
                padding: 8px 16px;
            }
            .namebox {
                min-height: 52px;
                min-width: 50px;
            }
            .productname {
                font-size: 24px;
            }
            .btn {
                font-size: 16px;
                min-width: 100px;
                padding: 10px 16px;
            }
        }
        @media (max-width: 720px) {
            .contentwrap {
                width: 96%;
                margin-top: 14px;
            }
            .page {
                padding: 14px;
            }
            .toprow {
                margin-bottom: 16px;
            }
            .namebox {
                min-width: 44px;
                min-height: 44px;
                padding: 6px 8px;
            }
            .namebox img {
                width: 34px;
                height: 34px;
            }
            .loginbtn {
                font-size: 14px;
                padding: 6px 12px;
            }
            .mainbox {
                padding: 16px 10px;
            }
            .productcard {
                min-height: auto;
                padding: 18px 10px 16px;
            }
            .productimage {
                height: 190px;
                margin-bottom: 16px;
            }
            .productname {
                font-size: 20px;
                margin-bottom: 16px;
            }
            .actions {
                gap: 10px;
            }
            .btn {
                min-width: 100px;
                padding: 8px 16px;
                font-size: 14px;
            }
            .nextlistanchor {
                font-size: 14px;
            }
            .footerServe a {
                margin: 18px 10px 0 10px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="basiccontainer">
        <div class="Header" >
            <h2 style="color: rgb(71, 71, 71); margin: 20px 20px 0 50px; font-size: 24px;">DragonGod Phone</h2>
            <div class=""></div>
        </div>

        <div class="contentwrap">
            <div class="page">
                <div class="toprow">
                    <div class="namebox">
                        <img src="Resources/logo_test.png" alt="logo">
                    </div>
                    <a class="loginbtn" href="../Web_SellPhone-feature-HTMLCSS-Detailed_Product_Introduction_Login_registration_Page/Web_SellPhone-feature-HTMLCSS-Detailed_Product_Introduction_Login_registration_Page/LoginPage.html">Log in</a>
                </div>
                <div class="mainbox">

                    <!-- Product Card -->
                    <article class="productcard singlecard">
                        <img class="productimage" src="Resources/phone_test.png" alt="Product Picture">
                        <h2 class="productname">Product name</h2>
                        <div class="actions">
                            <!-- Action Links -->
                            <a class="btn" href="../Web_SellPhone-feature-HTMLCSS-Detailed_Product_Introduction_Login_registration_Page/IntroPage.html">Learn more</a>
                            <a class="btn" href="SellPage.html">Buy</a>
                        </div>
                    </article>


                    <div class="nextlistanchor">More products can be appended below this product card.</div>
                </div>
            </div>
        </div>
        <div class="Footer">
            <div class="footerServe">
                <a href="#">Terms of Service</a>
                <div style="height: 100%; border-left: 1px solid rgb(109, 109, 109);"></div>
                <a href="#">Privacy Policy</a>
                <div style="height: 100%; border-left: 1px solid rgb(109, 109, 109);"></div>
                <a href="#">Contact Us</a>
            </div>
            <p class="footertext">© 2026 DragonGod Phone. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
