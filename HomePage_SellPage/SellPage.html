<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sell Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: rgb(227, 227, 227);
        }
        .basiccontainer {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .Header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            width: 100%;
            padding: 0 50px;
            box-sizing: border-box;
        }
        .Header h2 {
            color: rgb(71, 71, 71);
            font-size: 24px;
            margin: 0;
        }
        .nav-links {
            display: flex;
            gap: 30px;
            font-size: 16px;
            color: #333;
            font-weight: 500;
        }
        .nav-links span {
            cursor: default;
        }
        .contentwrap {
            display: flex;
            flex-direction: column;
            width: 100%;
            padding: 0 50px;
            box-sizing: border-box;
            margin: 24px 0 0;
        }
        .page {
            width: 100%;
            margin: 0 auto 20px;
            background-color: #ffffff;
            border-radius: 5px;
            padding: 18px 22px 28px;
            box-sizing: border-box;
        }
        .backhome {
            text-decoration: none;
            color: white;
            background: rgb(184, 122, 122);
            border-radius: 5px;
            font-size: 16px;
            padding: 10px 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
        }
        .backhome:hover {
            background: rgb(234, 179, 179);
        }
        .mainbox {
            padding: 18px 16px;
        }
        .buylayout {
            display: grid;
            grid-template-columns: 460px 1fr;
            gap: 40px;
            align-items: start;
        }
        .leftcol {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .imagebox {
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgb(250, 250, 250);
            overflow: hidden;
            height: 460px;
        }
        .imagebox img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .thumbnail-list {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .thumb-item {
            width: 60px;
            height: 60px;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            padding: 4px;
            background-color: rgb(250, 250, 250);
        }
        .thumb-item.active {
            border-color: rgb(184, 122, 122);
        }
        .thumb-item img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .rightcol {
            display: flex;
            flex-direction: column;
            gap: 36px;
            padding-top: 10px;
        }
        .product-title {
            font-size: 28px;
            color: #333;
            font-weight: 600;
        }
        .product-desc {
            font-size: 14px;
            color: #666;
            margin-top: -10px;
        }
        .product-price {
            font-size: 28px;
            color: rgb(184, 122, 122);
            font-weight: bold;
            margin-bottom: 10px;
        }
        .option-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-title {
            font-size: 16px;
            color: #333;
        }
        .option-list {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: 1px solid transparent;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
            background: #f2f2f2;
            transition: all 0.2s;
        }
        .option-item:hover {
            border-color: #999;
        }
        .option-item.active {
            border-color: rgb(184, 122, 122);
            color: rgb(184, 122, 122);
            background: rgba(184, 122, 122, 0.05);
        }
        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #ddd;
        }
        .bottomactions {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .actionlinks {
            display: flex;
            align-items: center;
            gap: 20px;
            width: 100%;
        }
        .learnbtn, .buybtn {
            text-decoration: none;
            color: white;
            background: rgb(184, 122, 122);
            border-radius: 5px;
            flex: 1;
            padding: 14px 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 500;
        }
        .learnbtn:hover, .buybtn:hover {
            background: rgb(234, 179, 179);
        }
        .Footer {
            width: 100%;
            padding-bottom: 0;
        }
        .footerServe {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .footerServe a {
            display: inline-block;
            margin: 30px 15px 0 15px;
            font-size: 15px;
            text-align: center;
            color: rgb(99, 99, 99);
            text-decoration: none;
        }
        .footerServe a:hover {
            text-decoration: underline;
        }
        .footertext {
            color: rgb(120, 120, 120);
            text-align: center;
            margin: 20px 0;
            font-size: 13px;
        }
        @media (max-width: 1180px) {
            .buylayout {
                grid-template-columns: 330px 1fr;
                gap: 18px;
            }
            .product-title {
                font-size: 24px;
            }
            .product-price {
                font-size: 24px;
            }
            .learnbtn, .buybtn {
                font-size: 18px;
                padding: 12px 16px;
                min-width: auto;
            }
            .backhome {
                min-width: 120px;
                padding: 8px 16px;
                font-size: 14px;
            }
            .Header {
                padding: 0 30px;
            }
            .contentwrap {
                padding: 0 30px;
                margin: 24px 0 0;
            }
            .nav-links {
                gap: 20px;
            }
        }
        @media (max-width: 820px) {
            .Header {
                padding: 0 10px;
            }
            .Header h2 {
                font-size: 18px;
            }
            .nav-links {
                display: none;
            }
            .contentwrap {
                width: 100%;
                padding: 0;
                margin: 14px 0 0;
            }
            .page {
                padding: 14px;
                border-radius: 0;
            }
            .backhome {
                min-width: 100px;
                padding: 6px 12px;
                font-size: 12px;
            }
            .buylayout {
                grid-template-columns: 1fr;
                gap: 14px;
            }
            .imagebox {
                min-height: 300px;
                height: auto;
            }
            .product-title {
                font-size: 20px;
            }
            .product-price {
                font-size: 20px;
            }
            .learnbtn, .buybtn {
                font-size: 16px;
                padding: 10px 16px;
                min-width: auto;
            }
            .footerServe a {
                margin: 30px 10px 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="basiccontainer">
        <div class="Header">
            <h2>DragonGod Phone</h2>
            <div class="nav-links">
                <span>Home</span>
                <span>About</span>
                <span>Store</span>
                <span>Market</span>
                <span>Search</span>
            </div>
            <a class="backhome" href="HomePage.html">Back to Home</a>
        </div>
        <div class="contentwrap">
            <div class="page">
                <div class="mainbox">
                    <main class="buylayout">
                        <section class="leftcol">
                            <div class="imagebox">
                                <img src="Resources/phone_test.webp" alt="Product Picture">
                            </div>
                        </section>
                        <section class="rightcol">
                            <h1 class="product-title">DragonGod Mate 80 Pro Max </h1>
                            <p class="product-desc">yihiyaha</p>
                            <div class="product-price">¥8848</div>

                            <div class="option-section">
                                <div class="option-title">color</div>
                                <div class="option-list">
                                    <div class="option-item active">
                                        <div class="color-dot" style="background-color: #000;"></div>
                                        <span>black</span>
                                    </div>
                                    <div class="option-item">
                                        <div class="color-dot" style="background-color: #ffffff;"></div>
                                        <span>white</span>
                                    </div>
                                </div>
                            </div>

                            <div class="option-section">
                                <div class="option-title">version</div>
                                <div class="option-list">
                                    <div class="option-item active">16GB+512GB</div>
                                    <div class="option-item">16GB+1TB</div>
                                </div>
                            </div>

                            <div class="bottomactions">
                                <div class="actionlinks">
                                    <a class="learnbtn" href="../Web_SellPhone-feature-HTMLCSS-Detailed_Product_Introduction_Login_registration_Page/IntroPage.html">learn more</a>
                                    <a class="buybtn" href="#">buy</a>
                                </div>
                            </div>
                        </section>
                    </main>
                </div>
            </div>
        </div>
        <div class="Footer">
            <div class="footerServe">
                <a href="#">Terms of Service</a>
                <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
                <a href="#">Privacy Policy</a>
                <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
                <a href="#">Contact Us</a>
            </div>
            <p class="footertext">© 2026 DragonGod Phone. All rights reserved.</p>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const optionSections = document.querySelectorAll('.option-section');
            optionSections.forEach(section => {
                const options = section.querySelectorAll('.option-item');
                options.forEach(option => {
                    option.addEventListener('click', function() {
                        options.forEach(opt => opt.classList.remove('active'));
                        this.classList.add('active');
                    });
                });
            });
        });
    </script>
</body>
</html>
