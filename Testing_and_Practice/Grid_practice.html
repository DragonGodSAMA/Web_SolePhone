<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QMPluss</title>
    <style>
        *{
            list-style-type:none;
            padding: 0;
            margin: 0;
        }
        .container{
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr 3fr;
            grid-template-rows: 10% auto 25%;
            grid-template-areas: 
                "header header"
                "sidebar main"
                "sidebar footer";
        }
        .box {
            width: 100px;
            height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
            max-width: 200px;
            min-width: 100px;
            color:white;
        }
        #index{
            margin-right: auto;
            flex-grow: 0;
            flex-shrink: 0;
            border-right: 1px solid white;
        }
        .header{
            grid-area: header;
            display:flex;
            justify-self: flex-end;
            height:100%;
            width:100%;

        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header" style="background-color: rgb(21, 39, 105); grid-area: header;">
            <div class="box" id="index">QMPluss</div>
        </div>
        <div style="background-color: rgb(208, 0, 255); grid-area: sidebar;">Sidebar</div>
        <div style="background-color: rgb(255, 255, 255); grid-area: main;">Main Content</div>
        <div style="background-color: rgb(21, 39, 105); grid-area: footer;">Footer</div>
    </div>
</body>
</html>
