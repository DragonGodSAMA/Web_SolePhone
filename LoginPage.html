<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>homepage</title>
    <script>
        username = document.getElementById("username").value;
        password = document.getElementById("password").value;
        if(username.length >= 12 || username.length <= 6){
            alert("Username must be between 6 and 12 characters.");
        }

        if(password.length <= 6){
            alert("Password must be more than 6 characters.");
        }
        else{
            alert("Login successful!");
        }
    </script>
 
    <style>.basic_contaner{
            cursor: pointer;
            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .Login_form {
            width: 80%;
            height: 80%;
            background-color: rgba(219, 216, 255, 0.078);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display:flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .QRcode-Box{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 200px;
            margin: 0 50px;
        }
        .QRcode-Box img{
            width: 180px;
            height: 180px;
        }
        .Login_container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 100vh;
        }
        .Login-container-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 600px;
            height: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .pwd-box {
            width: 400px;
        }
        .pwd-box input {
            display: block;
            width: calc(100% - 60px);
            margin: 20px 50px;
            padding: 8px;
            background-color: rgb(215, 215, 215);
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .pwd-box button {
            width: calc(100% - 40px);
            margin: 20px 50px;
            padding: 10px;
            background: rgb(184, 122, 122);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .pwd-box button:hover {
            background: rgb(234, 179, 179);
        }
        .pwd-box a {
            display: block;
            margin-top: 10px;
            margin-bottom: 14px;
            font-size: 10px;
            text-align: center;
            color: rgb(75, 129, 255);
            text-decoration: none;
        }
        .pwd-box a:hover {
            text-decoration: underline;
        }
        .Resister-Box {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .Resister-Box a {
            display: inline-block;
            
            margin-top: 10px;
            font-size: 10px;
            text-align: center;
            color: rgb(75, 129, 255);
            text-decoration: none;
        }
        .Resister-Box a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="Login_container">
        <h1>Login</h1>
        <div class="Login-container-box">
            <div class="QRcode-Box">
                <img src="QRcode.png" alt="QR code">
                <p style="display: block; color: rgb(109, 109, 109);">QR code login here.</p>
            </div>

            <div style="height: 100%; border-left: 1px solid rgb(109, 109, 109);"></div>

            <div class="pwd-box">
                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                <a href="#">SMS Verification Code Login</a> 
                <button>Login</button>
                <div class="Resister-Box">
                    <a href="#">Forgot Password</a>
                    <div style="height: 100%; border-left: 1px solid rgb(109, 109, 109);"></div>
                    <a href="#">Register Now</a>
                    <div style="height: 100%; border-left: 1px solid rgb(109, 109, 109);"></div>
                    <a href="#">Help</a>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
