<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoginPage</title>
    <script>
        function checkUNPWlen(){
            username = document.getElementById("un").value;
            password = document.getElementById("pw").value;
            if(username.length >= 12 || username.length <= 6){
                alert("Username must be between 6 and 12 characters.");
            }

            if(password.length <= 6){
                alert("Password must be more than 6 characters.");
            }
            else{
                alert("Login successful!");
            }
        }
    </script>
 
    <style>
        * {
            list-style-type:none;
            padding: 0;
            margin: 0;
        }
        body {
            background-color: rgb(227, 227, 227);
        }
        .basic_contaner {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 80px auto 130px;
            grid-template-areas: 
                "header"
                "main"
                "footer";
        }
        .Header {
            grid-area: header;
            display:flex;
            justify-self: flex-end;
            height:100%;
            width:100%;
        }
        .Login_out_container{
            grid-area: main;
            background-color: rgb(255, 255, 255);
        }
        .Login_form {
            width: 80%;
            height: 80%;
            background-color: rgba(219, 216, 255, 0.078);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            display:flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .QRcode-Box {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 200px;
            margin: 0 50px;
        }
        .QRcode-Box img{
            width: 200px;
            height: 200px;
        }
        .Login_container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 80vh;
        }
        .Login-container-box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 600px;
            height: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .pwd-box {
            width: 400px;
        }
        .pwd-box input {
            display: block;
            width: calc(100% - 60px);
            margin: 20px 50px;
            padding: 8px;
            background-color: rgb(215, 215, 215);
            border: 1px solid rgb(227, 227, 227);
            border-radius: 5px;
        }
        .pwd-box button {
            width: calc(100% - 40px);
            margin: 20px 50px;
            padding: 10px;
            background: rgb(184, 122, 122);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }
        .pwd-box button:hover {
            background: rgb(190, 134, 134);
        }
        .pwd-box a {
            display: block;
            margin-top: 10px;
            margin-bottom: 14px;
            font-size: 10px;
            text-align: center;
            color: rgb(75, 129, 255);
            text-decoration: none;
        }
        .pwd-box a:hover {
            text-decoration: underline;
        }
        .Resister-Box {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .Resister-Box a {
            display: inline-block;
            margin: 10px 10px 0 10px;
            font-size: 10px;
            text-align: center;
            color: rgb(75, 129, 255);
            text-decoration: none;
        }
        .Resister-Box a:hover {
            text-decoration: underline;
        }
        .footer-Serve {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .footer-Serve a {
            display: inline-block;
            margin: 30px 15px 0 15px;
            font-size: 15px;
            text-align: center;
            color: rgb(99, 99, 99);
            text-decoration: none;
        }
        .footer-Serve a:hover {
            text-decoration: underline;
        }
        @media (max-width: 600px) {
            .Login-container-box {
                flex-direction: column;
                width: 90%;
                height: auto;
            }
            .QRcode-Box {
                margin: 20px 0;
            }
            .QRcode-Box img {
                width: 100%;
                height: 100%;
            }
            .pwd-box {
                width: 100%;
            }
             .pwd-box button {
                text-align: center;
                width: 100%;
                margin: 10px 0;
            }
            .pwd-box input {
                text-align: center;
                width: calc(100% - 20px);
                margin: 10px 0;
            }
            .footer-Serve a {
                margin: 30px 10px 0 10px;
            }
        }
        
    </style>
</head>
<body>
    <div class="basic_contaner">
        <div class="Header" >
            <h2 style="color: rgb(71, 71, 71); margin: 20px 20px 0 50px;">DragonGod Phone</h2>
            <div class=""></div>
        </div>
        <div class="Login_out_container">   
            <div class="Login_container">
                <h1 style="color: rgb(71, 71, 71);">DragonGod Phone Login</h1>
                <div class="Login-container-box">
                    <div class="QRcode-Box">
                        <img src="QRcode.png" alt="QR code">
                        <p style="display: block; color: rgb(109, 109, 109);">QR code login here.</p>
                    </div>

                    <div style="height: 100%; border-left: 1px solid rgb(109, 109, 109);"></div>

                    <div class="pwd-box">
                        <input type="text" id="un" placeholder="Username">
                        <input type="password" id="pw" placeholder="Password">
                        <a href="#" style="margin-right: auto;">Click here to use SMS Verification Code Login</a> 
                        <button onclick="checkUNPWlen()">Login</button>
                        <div class="Resister-Box">
                            <a href="#">Forgot Password</a>
                            <div style="height: 15px; border-left: 1px solid rgb(109, 109, 109, 0.5);margin-top: 10px;"></div>
                            <a href="#">Register Now</a>
                            <div style="height: 15px; border-left: 1px solid rgb(109, 109, 109, 0.5);margin-top: 10px;"></div>
                            <a href="#">Help</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div>
            <div class="footer-Serve">
                <a href="#">Terms of Service</a>
                <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
                <a href="#">Privacy Policy</a>
                <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
                <a href="#">Contact Us</a>
            </div>
            <p style="color: rgb(120, 120, 120); text-align: center; margin: 20px 0;">© 2026 DragonGod Phone. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
