<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon God Phone Registration</title>
    <style>
        * {
            list-style-type:none;
            padding: 0;
            margin: 0;
        }
        body {
            background-color: rgb(227, 227, 227);
        }
        .basic_contaner {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: 80px auto 130px;
            grid-template-areas: 
                "header"
                "main"
                "footer";
        }
        .Header {
            grid-area: header;
            display:flex;
            align-items: center;
            height:100%;
            width:100%;
        }
        .Registration_out_container{
            grid-area: main;
            background-color: rgb(255, 255, 255);
        }
        .Registration_container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            height: 80vh;
        }
        .Registration_container h1{
            color: rgb(71, 71, 71);
            position: relative;
            top: 50px;
        }
        .Registration_container_box {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 600px;
            height: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        .Registration_box {
            width: 400px;
        }
        .Registration_box input {
            display: block;
            width: calc(100% - 30px);
            margin: 20px 50px;
            padding: 8px;
            background-color: rgb(215, 215, 215);
            border: 1px solid rgb(227, 227, 227);
            border-radius: 5px;
            position: relative;
            right: 25px;
        }
        .Registration_box label {
            display: block;
            font-size: 1rem;
            color: rgb(71, 71, 71);
            margin-bottom: 0.5rem;
            font-weight: 500;
            position: relative;
            left: 25px;
        }
        .Registration_button {
            width: 100%;
            margin: 20px 100px;
            padding: 10px;
            background: rgb(184, 122, 122);
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            position: relative;
            right: 100px;
            bottom: 50px;
        }
        .Registration_button:hover {
            background: rgb(190, 134, 134);
        }
        
        .footer_Serve {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
        }
        .footer_Serve a {
            display: inline-block;
            margin: 30px 15px 0 15px;
            font-size: 15px;
            text-align: center;
            color: rgb(99, 99, 99);
            text-decoration: none;
        }
        .footer_Serve a:hover {
            text-decoration: underline;
        }
        .Back-btn {
            padding: 8px 20px;
            margin-left: auto;
            margin-right: 80px;
            border: 1.25px solid rgb(184, 122, 122);
            border-radius: 4px;
            color: rgb(184, 122, 122);
            text-decoration: none;
            font-size: 14px;
        }

        .Back-btn:hover {
            background-color: rgb(184, 122, 122);
            color: rgb(255, 255, 255);
        }
        @media (max-width: 768px) {
            .Registration_container h1{
                top: 70px;
            }
             .Registration_container_box {
                width: 90%;
                height: auto;
                flex-direction: column;
            }
            .Registration_container_box {
                flex-direction: column;
                width: 90%;
                height: auto;
            }
            .Registration_box {
                width: 100%;
            }
            .Registration_box input {
                width: calc(100% - 80px);
            }
        }

    </style>
    <script src="Registerck.js"></script>
</head>
<body>
    <div class="basic_contaner">
        <div class="Header" >
            <h2 style="color: rgb(71, 71, 71); margin: 0 20px 0 50px;">DragonGod Phone</h2>
            <a class="Back-btn" href="LoginPage.html">Back</a>
        </div>
        <div class="Registration_out_container">   
            <div class="Registration_container">
                <h1>Registration</h1>
                <div class="Registration_container_box">
                    <div class="Registration_box">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Enter your full name">
                        <label for="address">Address</label>
                        <input type="text" id="address" name="address" placeholder="Enter your address">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" placeholder="11-digit mainland Chinese phone number">
                    </div>

                    <div style="height: 80%; border-left: 1px solid rgb(109, 109, 109);margin:0 15px 0 25px;"></div>

                    <div class="Registration_box">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" placeholder="Enter your email">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" placeholder="At least 6 alphanumeric characters">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" placeholder="At least 6 alphanumeric characters">
                    </div>
                    
                </div>
                <div>
                    <button type="submit" class="Registration_button" onclick="checkForm()">Register</button>
                </div>
            </div>
        </div>
        <div>
        <div class="footer_Serve">
            <a href="#">Terms of Service</a>
            <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
            <a href="#">Privacy Policy</a>
            <div style="height: 20px; border-left: 1px solid rgb(109, 109, 109);margin-top: 30px;"></div>
            <a href="#">Contact Us</a>
        </div>
        <p style="color: rgb(120, 120, 120); text-align: center; margin: 20px 0;">© 2026 DragonGod Phone. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
